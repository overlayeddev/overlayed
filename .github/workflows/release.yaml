name: "Release"

on:
  # Allow manual
  workflow_dispatch:
  push:
    branches:
      # TODO: REMOVE ME BEFORE MERGE
      - migrate/codesign
      - copilot/sub-pr-253

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    name: Build (${{ matrix.settings.os }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          # TODO: re-enable after Windows signing is verified e2e
          # - host: macos-latest
          #   target: universal-apple-darwin
          #   toolchain: aarch64-apple-darwin,x86_64-apple-darwin
          #   bundles: app,dmg
          #   os: darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            toolchain: x86_64-pc-windows-msvc
            bundles: msi,nsis
            os: windows
          # TODO: re-enable after Windows signing is verified e2e
          # - host: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          #   toolchain: x86_64-unknown-linux-gnu
          #   bundles: deb,appimage
          #   os: linux
    env:
      APP_DIR: "apps/desktop"
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          target: "${{ matrix.settings.toolchain }}"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri/target"
      - name: install dependencies (ubuntu only)
        if: matrix.settings.host == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: install frontend dependencies
        run: pnpm install
      - uses: tauri-apps/tauri-action@dev
        id: tauri
        env:
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_PASSWORD: "${{ secrets.APPLE_PASSWORD }}"
          APPLE_TEAM_ID: "${{ secrets.APPLE_TEAM_ID }}"
          APPLE_SIGNING_IDENTITY: "${{ secrets.APPLE_SIGNING_IDENTITY }}"
          APPLE_CERTIFICATE: "${{ secrets.APPLE_CERTIFICATE }}"
          APPLE_CERTIFICATE_PASSWORD: "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
          TAURI_SIGNING_PRIVATE_KEY: "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          TAURI_SIGNING_PUBLIC_KEY: "${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          VITE_AXIOM_TOKEN: "${{ secrets.VITE_AXIOM_TOKEN }}"
          VITE_SENTRY_AUTH_TOKEN: "${{ secrets.VITE_SENTRY_AUTH_TOKEN }}"
        with:
          projectPath: "${{ env.APP_DIR }}"
          args: --target ${{ matrix.settings.target }} --bundles ${{ matrix.settings.bundles }},updater

      # Windows: collect unsigned binaries, sign them, then assemble final artifact
      - name: Collect unsigned Windows binaries
        if: matrix.settings.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "./binaries"
          $paths = '${{ steps.tauri.outputs.artifactPaths }}' | ConvertFrom-Json
          $toSign = $paths | Where-Object { $_ -match '\.(exe|msi)$' } | Where-Object { $_ -notmatch '\.(sig|zip)$' }
          $toSign | ForEach-Object {
            $fileName = Split-Path $_ -Leaf
            Copy-Item $_ -Destination ".\binaries\$fileName"
          }
          Get-ChildItem -Path ".\binaries" -File | ForEach-Object { Get-FileHash -Path $_.FullName -Algorithm SHA256 }

      - name: Upload unsigned Windows binaries
        if: matrix.settings.os == 'windows'
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          path: ./binaries

      - name: Sign Windows binaries
        if: matrix.settings.os == 'windows'
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'b2cc34a4-3b75-4753-82e4-b755351770ea'
          project-slug: 'overlayed'
          # TODO: switch to the production signing policy when available
          signing-policy-slug: 'test-signing'
          github-artifact-id: '${{ steps.upload-unsigned-artifact.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'binaries/signed'

      - name: Add updater files to Windows release artifact
        if: matrix.settings.os == 'windows'
        shell: pwsh
        run: |
          $paths = '${{ steps.tauri.outputs.artifactPaths }}' | ConvertFrom-Json
          $updaterFiles = $paths | Where-Object { $_ -match '\.(sig|zip)$' }
          $updaterFiles | ForEach-Object {
            $fileName = Split-Path $_ -Leaf
            Copy-Item $_ -Destination ".\binaries\signed\$fileName"
          }
          Get-ChildItem -Path ".\binaries\signed" -File | ForEach-Object { Get-FileHash -Path $_.FullName -Algorithm SHA256 }

      - name: Upload Windows release artifacts
        if: matrix.settings.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ./binaries/signed

      # macOS and Linux: collect and upload all build artifacts
      - name: Collect macOS/Linux artifacts
        if: matrix.settings.os != 'windows'
        shell: bash
        run: |
          mkdir -p ./artifacts
          echo '${{ steps.tauri.outputs.artifactPaths }}' | python3 -c "
          import json, sys, shutil, os
          paths = json.load(sys.stdin)
          for p in paths:
              shutil.copy(p, './artifacts/' + os.path.basename(p))
          "
          ls -la ./artifacts/

      - name: Upload ${{ matrix.settings.os }} release artifacts
        if: matrix.settings.os != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.settings.os }}-release
          path: ./artifacts

  create-release:
    needs: build-tauri
    name: Create Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Get app version
        run: echo "PACKAGE_VERSION=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').package.version")" >> $GITHUB_ENV
      - name: Create release or skip
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { script } = await import('${{ github.workspace }}/scripts/actions/create-release.js')
            return await script({ github, context });

  upload-release:
    needs: create-release
    name: Upload Release Artifacts
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download all release artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: '*-release'
          path: ./release-artifacts
          merge-multiple: true
      - name: Upload artifacts to release
        uses: actions/github-script@v7
        with:
          script: |
            const { script } = await import('${{ github.workspace }}/scripts/actions/upload-release-artifacts.js')
            const id = "${{ needs.create-release.outputs.release_id }}";
            await script({ github, context }, id);

